<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="스마트 식단">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3443/3443338.png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/3443/3443338.png">

    <title>충주캠퍼스 스마트 식단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
            overscroll-behavior-y: contain;
            transition: background-color 0.3s ease;
        }
        .dark body { background-color: #020617; }
        
        .dark #main-header { 
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%) !important;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .star-gold { color: #fbbf24; filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.4)); transform: scale(1.1); }
        .disabled-stars { pointer-events: none; opacity: 0.8; }
        
        .rest-bg { background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%) !important; }
        .dark .rest-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important; border: 1px solid #1e293b; }

        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .skeleton { animation: shimmer 1.5s infinite ease-in-out; background-color: #e2e8f0; border-radius: 1rem; }
        .dark .skeleton { background-color: #1e293b; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-white shadow-2xl pb-10 dark:bg-slate-900 dark:shadow-none">

    <header id="main-header" class="bg-gradient-to-br from-indigo-600 to-blue-500 text-white rounded-b-[50px] shadow-xl relative z-10 transition-all duration-700">
        <div style="height: env(safe-area-inset-top); min-height: 20px;"></div>
        <div class="p-8 pt-4">
            <div class="flex justify-between items-start">
                <div>
                    <p id="current-date" class="text-indigo-100 text-sm font-bold mb-1"></p>
                    <h1 id="greeting" class="text-2xl font-bold tracking-tight leading-tight">맛있는 식사 하세요! 🍱</h1>
                </div>
                <div class="flex flex-col gap-2 items-end">
                    <div class="bg-white/20 backdrop-blur-md p-2 rounded-2xl text-center min-w-[75px] border border-white/10 flex flex-col gap-1.5 shadow-sm">
                        <div class="flex flex-col border-b border-white/10 pb-1">
                            <span class="text-[9px] opacity-80 font-bold tracking-tighter">기온</span>
                            <span id="realtime-temp" class="text-lg font-black italic leading-none">--°</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[9px] opacity-80 font-bold tracking-tighter">강수</span>
                            <span id="precipitation" class="text-sm font-black text-blue-200 leading-none">--%</span>
                        </div>
                    </div>
                    <button onclick="toggleDarkMode()" class="bg-white/20 backdrop-blur-md p-2.5 rounded-xl border border-white/10 hover:bg-white/30 transition-all shadow-sm active:scale-90">
                        <span id="dark-icon" class="text-lg leading-none block">☀️</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="p-5 relative z-20 mt-4 space-y-6">
        <section id="main-card" class="bg-white rounded-[32px] shadow-2xl shadow-blue-100 p-6 border border-gray-50 overflow-hidden min-h-[420px] flex flex-col transition-all duration-500 dark:bg-slate-800 dark:border-slate-700 dark:shadow-none">
            <div id="card-header" class="flex justify-between items-center mb-6">
                <span id="meal-type-tag" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase dark:bg-orange-900/30 dark:text-orange-400">LUNCH</span>
                <span id="display-day-tag" class="text-[10px] text-blue-500 font-bold bg-blue-50 px-2 py-1 rounded-md dark:bg-blue-900/30 dark:text-blue-300"></span>
            </div>
            
            <div id="meal-content">
                <div class="space-y-4 mb-8">
                    <h2 class="text-2xl font-black text-gray-800 dark:text-slate-100 flex items-center gap-2">오늘의 메뉴</h2>
                    <ul id="menu-list" class="grid grid-cols-1 gap-2">
                        <li class="h-14 skeleton"></li>
                        <li class="h-14 skeleton"></li>
                        <li class="h-14 skeleton"></li>
                    </ul>
                </div>
                <div class="bg-slate-50 p-5 rounded-[24px] border border-slate-100 shadow-inner dark:bg-slate-900/50 dark:border-slate-700">
                    <h3 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest text-center">Nutrition Report</h3>
                    
                    <div class="flex flex-col items-center justify-center mb-6 py-2 border-b border-slate-200/50 dark:border-slate-700/50">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter mb-0.5">예상 섭취 칼로리</span>
                        <div class="flex items-baseline gap-1">
                            <span id="calories" class="text-xl font-black text-indigo-600 dark:text-indigo-400">0</span>
                            <span class="text-xs font-bold text-slate-500">kcal</span>
                        </div>
                    </div>

                    <div id="nutrition-bars" class="space-y-6"></div>
                    <p class="text-[9px] text-slate-400 mt-6 text-center leading-relaxed font-medium">표시된 영양 정보는 추정치이므로 참고용으로만 활용해 주세요.</p>
                </div>
            </div>

            <div id="weekend-message" class="hidden flex-1 flex flex-col items-center justify-center py-12 text-center space-y-6">
                <div class="text-7xl animate-bounce">😴</div>
                <div>
                    <h2 id="rest-title" class="text-2xl font-black text-slate-800 dark:text-slate-100 mb-2">식당도 쿨쿨 자는 중!</h2>
                    <p id="rest-subtitle" class="text-base text-slate-500 dark:text-slate-400 leading-relaxed font-medium"></p>
                </div>
                <div class="bg-white/70 backdrop-blur-sm px-8 py-3 rounded-2xl border border-orange-100 shadow-sm dark:bg-slate-800/70 dark:border-indigo-900/50">
                    <p id="return-msg" class="text-sm font-black text-orange-600 dark:text-orange-400"></p>
                </div>
            </div>
        </section>

        <section id="rating-section" class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm dark:bg-slate-800 dark:border-slate-700">
            <div class="text-center">
                <p id="rating-title" class="text-slate-800 dark:text-slate-200 text-[10px] font-black mb-1 uppercase tracking-widest">
                    방금 드신 <span id="rating-meal-name" class="text-indigo-600 dark:text-indigo-400">식사</span>는 어떠셨나요?
                </p>
                <p id="rating-menu-preview" class="text-[9px] text-slate-400 font-medium mb-4 px-4 truncate"></p>
                
                <div class="flex flex-col gap-4">
                    <div id="star-container" class="flex justify-center gap-3 text-4xl">
                        <button onclick="selectRating(1)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                        <button onclick="selectRating(2)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                        <button onclick="selectRating(3)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                        <button onclick="selectRating(4)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                        <button onclick="selectRating(5)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                    </div>

                    <div id="feedback-input-container" class="flex flex-col gap-2">
                        <div class="flex gap-2">
                            <input type="text" id="feedback-text" placeholder="식당 이모님께 전하고 싶은 말씀..." 
                                class="flex-1 bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-700 rounded-xl px-4 py-3 text-xs text-slate-800 dark:text-slate-100 outline-none focus:border-indigo-300 transition-all">
                            <button id="send-btn" onclick="submitFullFeedback()" class="bg-indigo-600 text-white px-4 py-3 rounded-xl text-xs font-bold active:scale-95 transition-all disabled:bg-slate-300 dark:disabled:bg-slate-700">보내기</button>
                        </div>
                        <p class="text-[9px] text-slate-400 text-left pl-1">※ 작성해주신 의견은 <span class="font-bold text-indigo-500">익명으로</span> 수렴됩니다.</p>
                    </div>
                </div>
                <p id="feedback-msg" class="text-indigo-600 dark:text-indigo-400 text-[11px] font-bold mt-4 h-4 opacity-0 transition-opacity">✅ 소중한 의견 감사합니다!</p>
            </div>
        </section>

        <section id="dev-contact-section" class="mt-12 mb-10 px-2 text-center">
            <div class="p-8 bg-indigo-50/30 dark:bg-indigo-900/10 rounded-[40px] border border-dashed border-indigo-100 dark:border-indigo-900/30">
                <div class="inline-block p-3 bg-white dark:bg-slate-800 rounded-2xl shadow-sm mb-4">🚀</div>
                <h4 class="text-sm font-black text-indigo-900 dark:text-indigo-200 mb-4 leading-relaxed px-4">
                불편한 점이나 제안하고 싶은 기능을 알려주세요.
                </h4>
                <div id="email-area" class="flex flex-col items-center gap-3">
                    <a href="https://forms.gle/CSuTJa8defrhDELr5" target="_blank" class="w-full max-w-[220px]">
                        <button class="w-full bg-indigo-600 text-white px-6 py-4 rounded-2xl text-xs font-black shadow-lg shadow-indigo-200 dark:shadow-none active:scale-95 transition-all">
                            익명으로 의견 남기기
                        </button>
                    </a>
                </div>
            </div>
        </section>

        <section id="admin-view" class="hidden p-6 bg-slate-900 rounded-[32px] text-xs font-mono text-slate-300 shadow-2xl border border-slate-700 space-y-6"></section>
    </main>

    <script>
        const ADMIN_PASSWORD = "0617"; 
        const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScG35dKFaOFHN5Cls4pcWGX9Q_5J1qa2pOxjBhFpoFddIJucw/formResponse";
        const ENTRY_IDS = {
            date: "entry.1731866414", meal: "entry.475926623", menu: "entry.525600404", score: "entry.615065306", feedback: "entry.119301674"
        };

        let now = new Date();
        const week = ['일', '월', '화', '수', '목', '금', '토'];
        const mealNameKR = { 'breakfast': '아침', 'lunch': '점심', 'dinner': '저녁' };
        let currentMenuData = null;
        let selectedScore = 0; 

        function initTheme() {
            const isDark = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            document.documentElement.classList.toggle('dark', isDark);
            document.getElementById('dark-icon').innerText = isDark ? '🌙' : '☀️';
        }
        initTheme();

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('dark-icon').innerText = isDark ? '🌙' : '☀️';
        }

        function getHolidayName(date) {
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const solarHolidays = { '1-1': '신정', '3-1': '삼일절', '5-5': '어린이날', '6-6': '현충일', '8-15': '광복절', '10-3': '개천절', '10-9': '한글날', '12-25': '성탄절' };
            return solarHolidays[`${m}-${d}`] || null;
        }

        function getMealStatus() {
            const hm = now.getHours() * 100 + now.getMinutes();
            
            let mealKey, mealLabel, targetDayOffset = 0, rateKey = null;

            if (hm < 830) { mealKey = 'breakfast'; mealLabel = 'BREAKFAST 🍳'; }
            else if (hm < 1330) { mealKey = 'lunch'; mealLabel = 'LUNCH 🍱'; }
            else if (hm < 1830) { mealKey = 'dinner'; mealLabel = 'DINNER 🌙'; }
            else { 
                mealKey = 'breakfast'; 
                mealLabel = 'NEXT BREAKFAST ☀️'; 
                targetDayOffset = 1; 
            }

            // 평가 노출 로직 (방금 먹은 식사를 평가)
            if (hm >= 830 && hm <= 1300) rateKey = 'breakfast';
            else if (hm >= 1330 && hm <= 1830) rateKey = 'lunch'; 
            else if (hm >= 1840 && hm <= 2350) rateKey = 'dinner';

            const targetDate = new Date(now);
            targetDate.setDate(now.getDate() + targetDayOffset);
            
            const day = targetDate.getDay();
            const isWeekend = day === 6 || day === 0;
            const isHoliday = getHolidayName(targetDate) !== null;
            const isRest = isWeekend || isHoliday;

            let returnText = targetDayOffset === 1 ? "내일 다시 만나요!" : "잠시만 기다려주세요!";
            let greetingText = "맛있는 식사 하세요! 🍱";
            
            if (isRest) {
                returnText = (day === 6 || day === 0) ? "평일에 다시 만나요!" : "휴일이 끝나면 다시 만나요!";
                greetingText = "편안한 휴식 되세요! ✨";
            }

            return { mealKey, mealLabel, rateKey, isRest, isHolidayMsg: isHoliday, returnText, greetingText, targetDayOffset };
        }

        function updateHeaderUI(status) {
            const dateStr = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
            const dayName = week[now.getDay()];
            document.getElementById('current-date').innerText = `${dateStr} (${dayName})`;
            document.getElementById('meal-type-tag').innerText = status.mealLabel;
            document.getElementById('greeting').innerText = status.greetingText;
        }

        async function loadData() {
            const status = getMealStatus();
            updateHeaderUI(status);

            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                currentMenuData = data;
                
                if (data.weather) {
                    document.getElementById('realtime-temp').innerText = data.weather.temp + "°";
                    document.getElementById('precipitation').innerText = data.weather.rain + "%";
                }

                // [메인 카드용 데이터] targetDayOffset 반영
                const displayDate = new Date(now);
                displayDate.setDate(now.getDate() + status.targetDayOffset);
                const targetDayNameEn = week[displayDate.getDay()];
                const mealData = data.meals ? data.meals[targetDayNameEn] : null;
                const currentMeal = mealData ? mealData[status.mealKey] : "식단 없음";

                // [평가 섹션용 데이터] targetDayOffset과 상관없이 무조건 '오늘(now)'의 데이터 사용
                const todayNameEn = week[now.getDay()];
                const todayData = data.meals ? data.meals[todayNameEn] : null;

                if (status.rateKey && todayData && todayData[status.rateKey]) {
                    const rateMenu = todayData[status.rateKey]; // 항상 오늘의 해당 끼니 메뉴
                    document.getElementById('rating-section').classList.remove('hidden');
                    document.getElementById('rating-meal-name').innerText = mealNameKR[status.rateKey];
                    document.getElementById('rating-menu-preview').innerText = rateMenu;
                    
                    const dateStr = now.toISOString().split('T')[0];
                    const savedScore = localStorage.getItem(`rated_${dateStr}_${status.rateKey}`);
                    
                    if (savedScore) {
                        selectedScore = parseInt(savedScore);
                        lockRatingUI(selectedScore);
                        lockTextFeedbackUI();
                    } else {
                        resetRatingUI();
                    }
                } else {
                    document.getElementById('rating-section').classList.add('hidden');
                }

                if (status.isRest) {
                    document.getElementById('meal-content').classList.add('hidden');
                    document.getElementById('weekend-message').classList.remove('hidden');
                    document.getElementById('main-card').classList.add('rest-bg');
                    document.getElementById('display-day-tag').innerText = "REST DAY";
                    document.getElementById('rest-subtitle').innerText = status.isHolidayMsg ? "공휴일에는 식당이 쉬어갑니다." : "주말에는 식당이 쉬어갑니다.";
                    document.getElementById('return-msg').innerText = status.returnText;
                } else {
                    document.getElementById('meal-content').classList.remove('hidden');
                    document.getElementById('weekend-message').classList.add('hidden');
                    document.getElementById('main-card').classList.remove('rest-bg');
                    document.getElementById('display-day-tag').innerText = targetDayNameEn + "요일 식단";
                    
                    if (currentMeal && currentMeal !== "식단 없음") {
                        const items = currentMeal.split(/,\s*/).filter(i => i.trim());
                        document.getElementById('menu-list').innerHTML = items.map(m => `<li class="flex items-center gap-3 p-3.5 bg-white dark:bg-slate-900 rounded-2xl text-slate-700 dark:text-slate-200 font-bold border border-slate-100 dark:border-slate-700 shadow-sm animate-fadeIn"><span class="w-2.5 h-2.5 bg-indigo-400 rounded-full"></span>${m}</li>`).join('');
                        
                        let nut = (mealData && mealData.nutrition) ? mealData.nutrition[status.mealKey] : null;
                        if (nut) {
                            document.getElementById('calories').innerText = nut.calories || 0;
                            document.getElementById('nutrition-bars').innerHTML = `
                                ${renderBar('탄수화물', nut.carbs, 'bg-blue-500', nut.carbs + 'g')}
                                ${renderBar('단백질', nut.protein, 'bg-emerald-500', nut.protein + 'g')}
                                ${renderBar('지방', nut.fat, 'bg-amber-400', nut.fat + 'g')}
                                ${renderBar('당류', nut.sugar, 'bg-rose-400', nut.sugar + 'g')}
                            `;
                        }
                    } else {
                        document.getElementById('calories').innerText = '0';
                        document.getElementById('menu-list').innerHTML = `<li class="p-8 text-center text-slate-400 font-medium">등록된 식단 정보가 없습니다.</li>`;
                        document.getElementById('nutrition-bars').innerHTML = `<p class="text-center text-[10px] text-slate-400 py-4">영양 정보 없음</p>`;
                    }
                }
            } catch (e) { console.error("Data Load Error:", e); }
        }

        function renderBar(label, val, color, weight) {
            return `<div><div class="flex justify-between items-end mb-1"><span class="text-[11px] font-black text-slate-800 dark:text-slate-200">${label}</span><span class="text-[10px] font-black text-indigo-600 dark:text-indigo-400">${weight}</span></div><div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-3 overflow-hidden"><div class="${color} h-full transition-all duration-1000" style="width: ${val}%"></div></div></div>`;
        }

        function selectRating(score) {
            const dateStr = now.toISOString().split('T')[0];
            const status = getMealStatus();
            if (localStorage.getItem(`rated_${dateStr}_${status.rateKey}`)) return;
            selectedScore = score;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((s, i) => { 
                if (i < score) s.classList.add('star-gold', 'opacity-100'), s.classList.remove('grayscale', 'opacity-30');
                else s.classList.add('grayscale', 'opacity-30'), s.classList.remove('star-gold', 'opacity-100');
            });
        }

        function resetRatingUI() {
            selectedScore = 0;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach(s => { s.classList.add('grayscale', 'opacity-30'); s.classList.remove('star-gold', 'opacity-100'); });
            document.getElementById('star-container').classList.remove('disabled-stars');
            document.getElementById('rating-title').innerHTML = `오늘 드신 <span class="text-indigo-600 dark:text-indigo-400">${mealNameKR[getMealStatus().rateKey] || '식사'}</span>는 어떠셨나요?`;
            const input = document.getElementById('feedback-text');
            const btn = document.getElementById('send-btn');
            input.disabled = false; input.value = "";
            btn.disabled = false; btn.innerText = "보내기";
        }

        async function submitFullFeedback() {
            const text = document.getElementById('feedback-text').value.trim();
            const status = getMealStatus();
            const dateStr = now.toISOString().split('T')[0];
            const ratingKey = `rated_${dateStr}_${status.rateKey}`;
            const menuText = document.getElementById('rating-menu-preview').innerText;

            if (selectedScore === 0) { alert("별점을 선택해 주세요!"); return; }
            if (localStorage.getItem(ratingKey)) return;

            const formData = new FormData();
            formData.append(ENTRY_IDS.date, dateStr);
            formData.append(ENTRY_IDS.meal, mealNameKR[status.rateKey]);
            formData.append(ENTRY_IDS.menu, menuText);
            formData.append(ENTRY_IDS.score, selectedScore);
            formData.append(ENTRY_IDS.feedback, text || "(의견 없음)");

            fetch(GOOGLE_FORM_URL, { method: 'POST', mode: 'no-cors', body: formData });
            localStorage.setItem(ratingKey, selectedScore);
            
            let stats = JSON.parse(localStorage.getItem('admin_stats_v3') || '{}');
            const key = `${dateStr}_${status.rateKey}`;
            if (!stats[key]) stats[key] = { total: 0, count: 0, feedbacks: [] };
            stats[key].total += selectedScore;
            stats[key].count += 1;
            if(text) stats[key].feedbacks.push({ time: new Date().toLocaleTimeString(), msg: text });
            localStorage.setItem('admin_stats_v3', JSON.stringify(stats));

            lockRatingUI(selectedScore);
            lockTextFeedbackUI();
            document.getElementById('feedback-msg').style.opacity = '1';
            setTimeout(() => { document.getElementById('feedback-msg').style.opacity = '0'; }, 3000);
            updateAdmin();
        }

        function lockRatingUI(score) {
            document.getElementById('star-container').classList.add('disabled-stars');
            document.getElementById('rating-title').innerText = "평가 완료! 감사합니다.";
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((s, i) => { 
                if (i < score) s.classList.add('star-gold', 'opacity-100'), s.classList.remove('grayscale', 'opacity-30');
                else s.classList.add('grayscale', 'opacity-30'), s.classList.remove('star-gold', 'opacity-100');
            });
        }

        function lockTextFeedbackUI() {
            const input = document.getElementById('feedback-text');
            const btn = document.getElementById('send-btn');
            input.disabled = true; input.placeholder = "참여해주셔서 감사합니다.";
            btn.disabled = true; btn.innerText = "완료";
        }

        function updateAdmin() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') === 'true') {
                if (sessionStorage.getItem('admin_auth') !== 'true') {
                    const pw = prompt("관리자 비밀번호:");
                    if (pw === ADMIN_PASSWORD) sessionStorage.setItem('admin_auth', 'true');
                    else { window.location.href = window.location.pathname; return; }
                }
                const stats = JSON.parse(localStorage.getItem('admin_stats_v3') || '{}');
                const adminView = document.getElementById('admin-view');
                let reportHtml = `<h4 class="text-emerald-400 font-bold mb-4 text-sm">🛠️ ADMIN DASHBOARD</h4>`;
                Object.entries(stats).reverse().forEach(([k, v]) => {
                    const [date, meal] = k.split('_');
                    reportHtml += `
                        <div class="bg-slate-800/50 p-4 rounded-2xl mb-4 border border-slate-700">
                            <div class="flex justify-between">
                                <span class="text-indigo-400 font-bold">${date}</span>
                                <span class="text-yellow-400">⭐ ${(v.total/v.count || 0).toFixed(1)} (${v.count}명)</span>
                            </div>
                            <h5 class="text-white font-bold mt-1">${mealNameKR[meal]}</h5>
                            <div class="space-y-1 mt-2">
                                ${(v.feedbacks || []).map(f => `<p class="text-slate-300 text-[10px] bg-slate-900/50 p-1 rounded">${f.msg}</p>`).join('')}
                            </div>
                        </div>`;
                });
                adminView.innerHTML = reportHtml + `<button onclick="resetStats()" class="w-full py-2 bg-rose-500/20 text-rose-400 rounded-xl text-[10px]">초기화</button>`;
                adminView.classList.remove('hidden');
            }
        }

        function resetStats() {
            if (confirm("삭제하시겠습니까?")) {
                localStorage.removeItem('admin_stats_v3');
                Object.keys(localStorage).forEach(key => { if (key.startsWith('rated_')) localStorage.removeItem(key); });
                location.reload();
            }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                now = new Date();
                loadData();
            }
        });

        loadData();
        updateAdmin();
    </script>
</body>
</html>
