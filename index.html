<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충주캠퍼스 식단 앱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f9fafb; }
        .star-active { transform: scale(1.2); transition: transform 0.2s; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen shadow-2xl bg-white">

    <header class="p-6 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-b-3xl shadow-lg">
        <div class="flex justify-between items-center">
            <div>
                <h1 id="greeting" class="text-2xl font-bold">맛있는 하루 되세요! 👋</h1>
                <p id="weather" class="text-sm opacity-90">☀️ 충주는 지금 맑음, 기분 좋은 한 끼!</p>
            </div>
            <div class="text-4xl">🌡️ 22°</div>
        </div>
    </header>

    <main class="p-4 space-y-6">
        <section class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="p-5">
                <div class="flex items-center space-y-1 mb-4">
                    <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold uppercase">Today's Lunch</span>
                </div>
                
                <div class="space-y-3 mb-6">
                    <h2 class="text-xl font-extrabold text-gray-800 flex items-center gap-2">
                        🍱 오늘 점심 메뉴
                    </h2>
                    <ul id="menu-list" class="text-gray-600 space-y-2 pl-1">
                        <li class="flex items-center gap-2">🍚 쌀밥</li>
                        <li class="flex items-center gap-2">🥘 청국장찌개</li>
                        <li class="flex items-center gap-2">🥬 섞박지</li>
                        <li class="flex items-center gap-2">🥤 떠먹는 요거트</li>
                    </ul>
                </div>

                <div class="bg-gray-50 p-4 rounded-2xl space-y-3">
                    <h3 class="text-sm font-bold text-gray-500">영양 성분 리포트</h3>
                    <div class="space-y-2">
                        <div>
                            <div class="flex justify-between text-xs mb-1"><span>탄수화물</span><span class="font-bold">70g</span></div>
                            <div class="w-full bg-gray-200 rounded-full h-1.5"><div class="bg-blue-400 h-1.5 rounded-full" style="width: 70%"></div></div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-1"><span>단백질</span><span class="font-bold">25g</span></div>
                            <div class="w-full bg-gray-200 rounded-full h-1.5"><div class="bg-green-400 h-1.5 rounded-full" style="width: 50%"></div></div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-1"><span>지방</span><span class="font-bold">15g</span></div>
                            <div class="w-full bg-gray-200 rounded-full h-1.5"><div class="bg-yellow-400 h-1.5 rounded-full" style="width: 30%"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="p-4 text-center">
            <p class="text-gray-500 text-sm mb-2">오늘 식사는 어떠셨나요?</p>
            <div id="star-container" class="flex justify-center gap-2 text-3xl">
                <button onclick="submitRate(1)" class="hover:scale-125 transition">⭐</button>
                <button onclick="submitRate(2)" class="hover:scale-125 transition">⭐</button>
                <button onclick="submitRate(3)" class="hover:scale-125 transition">⭐</button>
                <button onclick="submitRate(4)" class="hover:scale-125 transition">⭐</button>
                <button onclick="submitRate(5)" class="hover:scale-125 transition">⭐</button>
            </div>
            <p id="thanks-msg" class="text-blue-500 text-xs mt-2 hidden">평가가 반영되었습니다! 감사합니다.</p>
        </section>

        <section id="admin-view" class="hidden border-t-2 border-dashed border-gray-200 pt-4 mt-8 px-4">
            <h4 class="text-red-500 font-bold text-sm mb-2 uppercase tracking-widest">Dev Admin Dashboard</h4>
            <div class="bg-gray-900 text-green-400 p-4 rounded-xl text-xs font-mono shadow-inner">
                <p>> 실시간 만족도 평균: <span id="avg-display" class="text-white font-bold">0.0</span>/5.0</p>
                <p>> 총 참여 인원: <span id="count-display" class="text-white font-bold">0</span>명</p>
                <p class="mt-2 text-gray-500">_데이터는 현재 세션에서만 임시 저장됩니다.</p>
            </div>
        </section>
    </main>

    <script>
        // 별점 데이터 관리 변수
        let totalScore = 0;
        let rateCount = 0;

        function submitRate(score) {
            totalScore += score;
            rateCount++;

            // 평균 계산 및 대시보드 반영
            const avg = (totalScore / rateCount).toFixed(1);
            document.getElementById('avg-display').innerText = avg;
            document.getElementById('count-display').innerText = rateCount;

            // 피드백 효과
            document.getElementById('thanks-msg').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('thanks-msg').classList.add('hidden');
            }, 2000);

            console.log(`새로운 평가: ${score}점 | 현재 평균: ${avg}`);
        }

        // 개발자 모드 켜는 법: 브라우저 주소창 끝에 ?admin=true 를 붙이세요
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('admin') === 'true') {
            document.getElementById('admin-view').classList.remove('hidden');
        }
    </header>
</body>
</html>
