<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충주캠퍼스 스마트 식단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .star-gold { color: #fbbf24; filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.4)); transform: scale(1.1); }
        .disabled-stars { pointer-events: none; opacity: 0.6; }
        /* 휴무 카드 그라데이션: 부드러운 핑크톤 */
        .rest-bg { background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%) !important; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-white shadow-2xl pb-10">

    <header class="p-8 bg-gradient-to-br from-indigo-600 to-blue-500 text-white rounded-b-[50px] shadow-xl relative z-10">
        <div class="flex justify-between items-start">
            <div>
                <p id="current-date" class="text-indigo-100 text-sm font-bold mb-1"></p>
                <h1 id="greeting" class="text-2xl font-bold tracking-tight leading-tight">맛있는 식사 하세요! 🍱</h1>
            </div>
            <div class="bg-white/20 backdrop-blur-md p-2 rounded-2xl text-center min-w-[75px] border border-white/10 flex flex-col gap-1.5">
                <div class="flex flex-col border-b border-white/10 pb-1">
                    <span class="text-[9px] opacity-80 font-bold uppercase tracking-tighter">Temp</span>
                    <span id="realtime-temp" class="text-lg font-black italic leading-none">--°</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] opacity-80 font-bold uppercase tracking-tighter">Rain</span>
                    <span id="precipitation" class="text-sm font-black text-blue-200 leading-none">--%</span>
                </div>
            </div>
        </div>
    </header>

    <main class="p-5 relative z-20 mt-4 space-y-6">
        <section id="main-card" class="bg-white rounded-[32px] shadow-2xl shadow-blue-100 p-6 border border-gray-50 overflow-hidden min-h-[420px] flex flex-col transition-all duration-500">
            <div id="card-header" class="flex justify-between items-center mb-6">
                <span id="meal-type-tag" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">LUNCH</span>
                <span id="display-day-tag" class="text-[10px] text-blue-500 font-bold bg-blue-50 px-2 py-1 rounded-md"></span>
            </div>
            
            <div id="meal-content">
                <div class="space-y-4 mb-8">
                    <h2 class="text-2xl font-black text-gray-800 flex items-center gap-2">오늘의 메뉴</h2>
                    <ul id="menu-list" class="grid grid-cols-1 gap-2">
                        <li class="p-4 bg-gray-50 rounded-2xl animate-pulse text-gray-300 border border-gray-100 text-center">식단을 가져오는 중...</li>
                    </ul>
                </div>
                <div class="bg-slate-50 p-5 rounded-[24px] border border-slate-100 shadow-inner">
                    <h3 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest text-center">Nutrition Report</h3>
                    <div id="nutrition-bars" class="space-y-5"></div>
                </div>
            </div>

            <div id="weekend-message" class="hidden flex-1 flex flex-col items-center justify-center py-12 text-center space-y-6">
                <div class="text-7xl animate-bounce">😴</div>
                <div>
                    <h2 id="rest-title" class="text-2xl font-black text-slate-800 mb-2">식당도 쿨쿨 자는 중!</h2>
                    <p id="rest-subtitle" class="text-base text-slate-500 leading-relaxed font-medium"></p>
                </div>
                <div class="bg-white/70 backdrop-blur-sm px-8 py-3 rounded-2xl border border-rose-100 shadow-sm">
                    <p id="return-msg" class="text-sm font-black text-rose-600"></p>
                </div>
            </div>
        </section>

        <section id="rating-section" class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm text-center">
            <p id="rating-title" class="text-slate-800 text-[10px] font-black mb-4 uppercase tracking-widest">오늘 식사는 어떠셨나요?</p>
            <div id="star-container" class="flex justify-center gap-3 text-4xl">
                <button onclick="submitRating(1)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(2)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(3)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(4)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(5)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
            </div>
            <p id="feedback-msg" class="text-indigo-600 text-[11px] font-bold mt-4 h-4 opacity-0 transition-opacity">✅ 평가가 반영되었습니다!</p>
        </section>

        <section id="admin-view" class="hidden p-5 bg-slate-900 rounded-[24px] text-xs font-mono text-slate-300 shadow-2xl">
            <h4 class="text-emerald-400 font-bold mb-2 tracking-tighter">🛠️ SYSTEM ADMIN DASHBOARD</h4>
            <div class="space-y-1">
                <p>> 누적 평점: <span id="admin-avg" class="text-white font-bold">0.0</span></p>
                <p>> 총 투표수: <span id="admin-count" class="text-white font-bold">0</span>회</p>
            </div>
        </section>
    </main>

    <script>
        const now = new Date();
        const week = ['일', '월', '화', '수', '목', '금', '토'];

        function getHolidayName(date) {
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const solarHolidays = {
                '1-1': '신정', '3-1': '삼일절', '5-5': '어린이날', '6-6': '현충일',
                '8-15': '광복절', '10-3': '개천절', '10-9': '한글날', '12-25': '성탄절'
            };
            return solarHolidays[`${m}-${d}`] || null;
        }

        function getMealStatus() {
            const day = now.getDay();
            const hm = now.getHours() * 100 + now.getMinutes();
            const tomorrow = new Date(now);
            tomorrow.setDate(now.getDate() + 1);
            
            const isTodayHoliday = getHolidayName(now) !== null;
            const isTomorrowHoliday = getHolidayName(tomorrow) !== null;

            const isWeekend = (day === 5 && hm >= 1830) || day === 6 || day === 0;
            const isHolidayPeriod = (isTomorrowHoliday && hm >= 1830) || isTodayHoliday;

            let returnText = "내일 다시 만나요!";
            let greetingText = "맛있는 식사 하세요! 🍱";

            if (day === 6 || day === 0 || (day === 5 && hm >= 1830)) {
                returnText = "다음 주 월요일에 봐요!";
                greetingText = "즐겁고 편안한 주말 되세요! ✨";
            } else if (isHolidayPeriod) {
                returnText = "휴일이 끝나면 다시 만나요!";
                greetingText = "꿀같은 휴일 보내세요! 🎈";
            }

            return { 
                mealKey: (hm < 830) ? 'breakfast' : (hm < 1330) ? 'lunch' : (hm < 1830) ? 'dinner' : 'breakfast',
                mealLabel: (hm < 830) ? 'BREAKFAST 🍳' : (hm < 1330) ? 'LUNCH 🍱' : (hm < 1830) ? 'DINNER 🌙' : 'NEXT BREAKFAST ☀️',
                isRest: isWeekend || isHolidayPeriod,
                isHolidayMsg: isHolidayPeriod && !isWeekend,
                returnText,
                greetingText,
                targetDayOffset: (hm >= 1830) ? 1 : 0
            };
        }

        const status = getMealStatus();
        document.getElementById('current-date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
        document.getElementById('meal-type-tag').innerText = status.mealLabel;
        document.getElementById('greeting').innerText = status.greetingText;

        async function loadData() {
            try {
                const response = await fetch('data.json?v=' + Math.random());
                const data = await response.json();
                
                // 날씨 정보 로드 (기온 & 강수 확률)
                if (data.weather) {
                    if (data.weather.temp) document.getElementById('realtime-temp').innerText = data.weather.temp + "°";
                    if (data.weather.rain !== undefined) {
                        const rainElem = document.getElementById('precipitation');
                        rainElem.innerText = data.weather.rain + "%";
                        // 비 올 확률이 높으면(60% 이상) 경고 의미로 색상 강조 (노란색)
                        if (data.weather.rain >= 60) {
                            rainElem.classList.replace('text-blue-200', 'text-yellow-300');
                            document.getElementById('greeting').innerText = "비 소식이 있어요! 우산 챙기세요! ☔";
                        }
                    }
                } else {
                    document.getElementById('realtime-temp').innerText = "21°";
                    document.getElementById('precipitation').innerText = "0%";
                }

                if (status.isRest) {
                    document.getElementById('meal-content').classList.add('hidden');
                    document.getElementById('rating-section').classList.add('hidden');
                    document.getElementById('weekend-message').classList.remove('hidden');
                    document.getElementById('main-card').classList.add('rest-bg');
                    document.getElementById('display-day-tag').innerText = "REST DAY";
                    document.getElementById('rest-subtitle').innerText = status.isHolidayMsg ? "공휴일에는 식당 이모님들도 쉬어가셔요." : "주말에는 식당 이모님들도 쉬어가셔요.";
                    document.getElementById('return-msg').innerText = status.returnText;
                    return;
                }

                const targetDate = new Date();
                targetDate.setDate(now.getDate() + status.targetDayOffset);
                const targetDayName = week[targetDate.getDay()];
                document.getElementById('display-day-tag').innerText = targetDayName + "요일 식단";

                const mealData = data.meals[targetDayName];
                if (mealData && mealData[status.mealKey]) {
                    const menuItems = mealData[status.mealKey].split(',');
                    document.getElementById('menu-list').innerHTML = menuItems.map(m => 
                        `<li class="flex items-center gap-3 p-3.5 bg-white rounded-2xl text-slate-700 font-bold border border-slate-100 shadow-sm"><span class="w-2.5 h-2.5 bg-indigo-400 rounded-full"></span>${m.trim()}</li>`
                    ).join('');

                    const nut = mealData.nutrition;
                    document.getElementById('nutrition-bars').innerHTML = `
                        ${renderBar('탄수화물', nut.carbs, 'bg-blue-500', '23%')}
                        ${renderBar('단백질', nut.protein, 'bg-emerald-500', '42%')}
                        ${renderBar('지방', nut.fat, 'bg-amber-400', '27%')}
                    `;
                }
            } catch (e) {
                console.error("데이터 로드 실패:", e);
                document.getElementById('realtime-temp').innerText = "ERR";
                document.getElementById('precipitation').innerText = "--%";
            }
        }

        function renderBar(label, val, color, percent) {
            return `<div><div class="flex justify-between items-end mb-1"><span class="text-[11px] font-black text-slate-800">${label}</span><span class="text-[10px] font-bold text-indigo-600">${percent}</span></div><div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden"><div class="${color} h-full transition-all duration-1000" style="width: ${val}%"></div></div></div>`;
        }

        const ratingKey = `rated_${now.toISOString().split('T')[0]}_${status.mealKey}`;
        function submitRating(score) {
            if (localStorage.getItem(ratingKey)) return;
            localStorage.setItem(ratingKey, score);
            let stats = JSON.parse(localStorage.getItem('admin_stats') || '{"total":0, "count":0}');
            stats.total += score; stats.count += 1;
            localStorage.setItem('admin_stats', JSON.stringify(stats));
            lockRatingUI(score);
            document.getElementById('feedback-msg').style.opacity = '1';
        }

        function lockRatingUI(score) {
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((s, i) => { 
                if (i < score) s.classList.add('star-gold'); 
                s.classList.add('cursor-default'); 
                s.classList.remove('grayscale', 'opacity-30');
            });
            document.getElementById('star-container').classList.add('disabled-stars');
            document.getElementById('rating-title').innerText = "평가 완료! 감사합니다.";
            updateAdmin();
        }

        function updateAdmin() {
            const stats = JSON.parse(localStorage.getItem('admin_stats') || '{"total":0, "count":0}');
            if (stats.count > 0) {
                document.getElementById('admin-avg').innerText = (stats.total / stats.count).toFixed(1);
                document.getElementById('admin-count').innerText = stats.count;
            }
            if (new URLSearchParams(window.location.search).get('admin') === 'true') {
                document.getElementById('admin-view').classList.remove('hidden');
            }
        }

        loadData();
        if (localStorage.getItem(ratingKey)) lockRatingUI(localStorage.getItem(ratingKey));
        updateAdmin();
    </script>
</body>
</html>
