<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충주캠퍼스 스마트 식단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .star-gold { color: #fbbf24; filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.4)); transform: scale(1.1); }
        .disabled-stars { pointer-events: none; opacity: 0.8; }
        .rest-bg { background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%) !important; }
        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .skeleton { animation: shimmer 1.5s infinite ease-in-out; background-color: #e2e8f0; border-radius: 1rem; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-white shadow-2xl pb-10">

    <header id="main-header" class="p-8 bg-gradient-to-br from-indigo-600 to-blue-500 text-white rounded-b-[50px] shadow-xl relative z-10 transition-all duration-700">
        <div class="flex justify-between items-start">
            <div>
                <p id="current-date" class="text-indigo-100 text-sm font-bold mb-1"></p>
                <h1 id="greeting" class="text-2xl font-bold tracking-tight leading-tight">맛있는 식사 하세요! 🍱</h1>
            </div>
            <div class="bg-white/20 backdrop-blur-md p-2 rounded-2xl text-center min-w-[75px] border border-white/10 flex flex-col gap-1.5">
                <div class="flex flex-col border-b border-white/10 pb-1">
                    <span class="text-[9px] opacity-80 font-bold tracking-tighter">기온</span>
                    <span id="realtime-temp" class="text-lg font-black italic leading-none">--°</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] opacity-80 font-bold tracking-tighter">강수</span>
                    <span id="precipitation" class="text-sm font-black text-blue-200 leading-none">--%</span>
                </div>
            </div>
        </div>
    </header>

    <main class="p-5 relative z-20 mt-4 space-y-6">
        <section id="main-card" class="bg-white rounded-[32px] shadow-2xl shadow-blue-100 p-6 border border-gray-50 overflow-hidden min-h-[420px] flex flex-col transition-all duration-500">
            <div id="card-header" class="flex justify-between items-center mb-6">
                <span id="meal-type-tag" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">LUNCH</span>
                <span id="display-day-tag" class="text-[10px] text-blue-500 font-bold bg-blue-50 px-2 py-1 rounded-md"></span>
            </div>
            
            <div id="meal-content">
                <div class="space-y-4 mb-8">
                    <h2 class="text-2xl font-black text-gray-800 flex items-center gap-2">오늘의 메뉴</h2>
                    <ul id="menu-list" class="grid grid-cols-1 gap-2">
                        <li class="h-14 skeleton"></li>
                        <li class="h-14 skeleton"></li>
                    </ul>
                </div>
                <div class="bg-slate-50 p-5 rounded-[24px] border border-slate-100 shadow-inner">
                    <h3 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest text-center">Nutrition Report</h3>
                    <div id="nutrition-bars" class="space-y-5"></div>
                    <p class="text-[9px] text-slate-400 mt-6 text-center leading-relaxed font-medium">표시된 영양 정보는 추정치입니다.</p>
                </div>
            </div>

            <div id="weekend-message" class="hidden flex-1 flex flex-col items-center justify-center py-12 text-center space-y-6">
                <div class="text-7xl animate-bounce">😴</div>
                <h2 id="rest-title" class="text-2xl font-black text-slate-800 mb-2">식당 휴무</h2>
                <p id="rest-subtitle" class="text-base text-slate-500 font-medium"></p>
                <div id="return-msg" class="text-sm font-black text-orange-600 bg-orange-50 px-6 py-2 rounded-xl"></div>
            </div>
        </section>

        <section id="rating-section" class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm text-center">
            <p id="rating-title" class="text-slate-800 text-[11px] font-black mb-4 uppercase tracking-tight italic">
                오늘 <span id="rating-meal-name" class="text-indigo-600">점심</span> 식사는 어떠셨나요?
            </p>
            <div id="star-container" class="flex justify-center gap-3 text-4xl">
                <button onclick="submitRating(1)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(2)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(3)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(4)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(5)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
            </div>
            <p id="feedback-msg" class="text-indigo-600 text-[11px] font-bold mt-4 h-4 opacity-0 transition-opacity">✅ 익명으로 평가가 반영되었습니다!</p>
        </section>

        <section id="admin-view" class="hidden p-6 bg-slate-900 rounded-[32px] text-xs font-mono text-slate-300 shadow-2xl border border-slate-700 space-y-6"></section>
    </main>

    <script>
        const ADMIN_PASSWORD = "0617"; 
        let now = new Date();
        const week = ['일', '월', '화', '수', '목', '금', '토'];

        // 시간대별 끼니 이름 한글 매핑
        const mealNameKR = { 'breakfast': '아침', 'lunch': '점심', 'dinner': '저녁' };

        function getHolidayName(date) {
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const solarHolidays = { '1-1': '신정', '3-1': '삼일절', '5-5': '어린이날', '6-6': '현충일', '8-15': '광복절', '10-3': '개천절', '10-9': '한글날', '12-25': '성탄절' };
            return solarHolidays[`${m}-${d}`] || null;
        }

        function getMealStatus() {
            const day = now.getDay();
            const hm = now.getHours() * 100 + now.getMinutes();
            const isTodayHoliday = getHolidayName(now) !== null;
            
            const isWeekend = (day === 5 && hm >= 1830) || day === 6 || day === 0;
            const isHolidayPeriod = isTodayHoliday;

            let mealKey, mealLabel, targetDayOffset = 0;
            if (hm < 830) { mealKey = 'breakfast'; mealLabel = 'BREAKFAST 🍳'; }
            else if (hm < 1330) { mealKey = 'lunch'; mealLabel = 'LUNCH 🍱'; }
            else if (hm < 1830) { mealKey = 'dinner'; mealLabel = 'DINNER 🌙'; }
            else { mealKey = 'breakfast'; mealLabel = 'NEXT BREAKFAST ☀️'; targetDayOffset = 1; }

            return { 
                mealKey, mealLabel,
                isRest: isWeekend || isHolidayPeriod,
                targetDayOffset 
            };
        }

        async function loadData() {
            const status = getMealStatus();
            document.getElementById('current-date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
            document.getElementById('meal-type-tag').innerText = status.mealLabel;
            document.getElementById('rating-meal-name').innerText = mealNameKR[status.mealKey] || "오늘";

            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                
                // 날씨 업데이트
                if (data.weather) {
                    document.getElementById('realtime-temp').innerText = data.weather.temp + "°";
                    document.getElementById('precipitation').innerText = data.weather.rain + "%";
                }

                if (status.isRest) {
                    toggleView(true);
                    return;
                }

                toggleView(false);
                const targetDate = new Date(now);
                targetDate.setDate(now.getDate() + status.targetDayOffset);
                const dayName = week[targetDate.getDay()];
                document.getElementById('display-day-tag').innerText = dayName + "요일 식단";

                const mealData = data.meals?.[dayName];
                const currentMenu = mealData?.[status.mealKey];

                if (currentMenu && currentMenu !== "식단 없음") {
                    const menuItems = currentMenu.split(/[, ]+/).filter(i => i.trim());
                    document.getElementById('menu-list').innerHTML = menuItems.map(m => 
                        `<li class="flex items-center gap-3 p-3.5 bg-white rounded-2xl text-slate-700 font-bold border border-slate-100 shadow-sm"><span class="w-2.5 h-2.5 bg-indigo-400 rounded-full"></span>${m}</li>`
                    ).join('');
                    
                    const nut = mealData.nutrition?.[status.mealKey] || mealData.nutrition;
                    renderNutrition(nut);
                } else {
                    document.getElementById('menu-list').innerHTML = `<li class="p-8 text-center text-slate-400 font-medium">등록된 식단이 없습니다.</li>`;
                }
            } catch (e) { console.error(e); }
        }

        function renderNutrition(nut) {
            const container = document.getElementById('nutrition-bars');
            if (nut && nut.carbs !== undefined) {
                container.innerHTML = `
                    ${renderBar('탄수화물', nut.carbs, 'bg-blue-500', nut.carbs + 'g')}
                    ${renderBar('단백질', nut.protein, 'bg-emerald-500', nut.protein + 'g')}
                    ${renderBar('지방', nut.fat, 'bg-amber-400', nut.fat + 'g')}
                `;
            } else {
                container.innerHTML = `<p class="text-center text-xs text-slate-300 py-4 italic">영양 정보가 없습니다.</p>`;
            }
        }

        function renderBar(label, val, color, weight) {
            return `<div><div class="flex justify-between items-end mb-1"><span class="text-[11px] font-black text-slate-800">${label}</span><span class="text-[10px] font-black text-indigo-600">${weight}</span></div>
                    <div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden"><div class="${color} h-full transition-all duration-1000" style="width: ${val}%"></div></div></div>`;
        }

        function toggleView(isRest) {
            document.getElementById('meal-content').classList.toggle('hidden', isRest);
            document.getElementById('rating-section').classList.toggle('hidden', isRest);
            document.getElementById('weekend-message').classList.toggle('hidden', !isRest);
            document.getElementById('main-card').classList.toggle('rest-bg', isRest);
        }

        // 별점 시스템 (끼니별 익명 저장)
        function submitRating(score) {
            const status = getMealStatus();
            const dateStr = now.toISOString().split('T')[0];
            const ratingKey = `rated_${dateStr}_${status.mealKey}`;

            if (localStorage.getItem(ratingKey)) return;

            localStorage.setItem(ratingKey, score);

            // 관리자용 통계 저장 (날짜_끼니별로 세분화)
            let allStats = JSON.parse(localStorage.getItem('admin_stats_v2') || '{}');
            const statKey = `${dateStr}_${status.mealKey}`;
            
            if (!allStats[statKey]) allStats[statKey] = { total: 0, count: 0 };
            allStats[statKey].total += score;
            allStats[statKey].count += 1;

            localStorage.setItem('admin_stats_v2', JSON.stringify(allStats));
            
            lockRatingUI(score);
            document.getElementById('feedback-msg').style.opacity = '1';
        }

        function lockRatingUI(score) {
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((s, i) => {
                if (i < score) s.classList.add('star-gold', 'opacity-100'), s.classList.remove('grayscale', 'opacity-30');
                else s.classList.add('grayscale', 'opacity-30'), s.classList.remove('star-gold', 'opacity-100');
            });
            document.getElementById('star-container').classList.add('disabled-stars');
            document.getElementById('rating-title').innerHTML = "✅ 평가 완료! 감사합니다.";
            updateAdmin();
        }

        // 관리자 대시보드 업데이트
        function updateAdmin() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') === 'true') {
                if (sessionStorage.getItem('admin_auth') !== 'true') {
                    if (prompt("관리자 비밀번호:") === ADMIN_PASSWORD) sessionStorage.setItem('admin_auth', 'true');
                    else return (location.href = window.location.pathname);
                }

                const allStats = JSON.parse(localStorage.getItem('admin_stats_v2') || '{}');
                const adminView = document.getElementById('admin-view');
                
                let detailHTML = Object.entries(allStats).reverse().map(([key, data]) => {
                    const [date, meal] = key.split('_');
                    const avg = (data.total / data.count).toFixed(1);
                    return `<div class="flex justify-between items-center border-b border-slate-700 pb-2">
                                <span>${date} <b class="text-indigo-400">${mealNameKR[meal]}</b></span>
                                <span>⭐${avg} (${data.count}명)</span>
                            </div>`;
                }).join('');

                adminView.innerHTML = `
                    <h4 class="text-emerald-400 font-bold mb-4 tracking-tighter">🛠️ 끼니별 평점 리포트 (익명)</h4>
                    <div class="space-y-3 max-h-60 overflow-y-auto pr-2">${detailHTML || '<p class="text-slate-500">데이터가 없습니다.</p>'}</div>
                    <button onclick="resetStats()" class="w-full mt-4 py-2 bg-rose-500/20 text-rose-400 border border-rose-500/50 rounded-xl font-bold">전체 데이터 초기화</button>
                `;
                adminView.classList.remove('hidden');
            }
        }

        function resetStats() {
            if (confirm("모든 평점 데이터를 삭제하시겠습니까?")) {
                localStorage.removeItem('admin_stats_v2');
                Object.keys(localStorage).forEach(k => k.startsWith('rated_') && localStorage.removeItem(k));
                location.reload();
            }
        }

        // 초기 실행
        loadData();
        updateAdmin();
        const initStatus = getMealStatus();
        const saved = localStorage.getItem(`rated_${now.toISOString().split('T')[0]}_${initStatus.mealKey}`);
        if (saved) lockRatingUI(parseInt(saved));
    </script>
</body>
</html>
