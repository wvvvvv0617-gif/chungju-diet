<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충주캠퍼스 스마트 식단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .star-gold { color: #fbbf24; filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.4)); transform: scale(1.1); }
        .disabled-stars { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-white shadow-2xl pb-10">

    <header class="p-6 bg-gradient-to-br from-indigo-600 to-blue-500 text-white rounded-b-[40px] shadow-xl">
        <div class="flex justify-between items-start">
            <div>
                <p id="current-date" class="text-indigo-100 text-sm font-bold mb-1"></p>
                <h1 id="greeting" class="text-2xl font-bold tracking-tight">맛있는 식사 하세요! 🍱</h1>
            </div>
            <div class="bg-white/20 backdrop-blur-md p-2 rounded-2xl text-center min-w-[64px]">
                <span class="text-[10px] block opacity-80 font-bold">충주 기온</span>
                <span id="realtime-temp" class="text-xl font-black">--°</span>
            </div>
        </div>
    </header>

    <main class="p-5 -mt-6 space-y-6">
        <section class="bg-white rounded-[32px] shadow-2xl shadow-blue-100 p-6 border border-gray-50">
            <div class="flex justify-between items-center mb-5">
                <span id="meal-type-tag" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">LUNCH</span>
                <span id="display-day-tag" class="text-[10px] text-blue-500 font-bold bg-blue-50 px-2 py-1 rounded-md"></span>
            </div>
            
            <div class="space-y-4 mb-8">
                <h2 class="text-2xl font-black text-gray-800 flex items-center gap-2">오늘의 메뉴</h2>
                <ul id="menu-list" class="grid grid-cols-1 gap-2">
                    <li class="p-4 bg-gray-50 rounded-2xl animate-pulse text-gray-300 border border-gray-100">식단을 확인하는 중...</li>
                </ul>
            </div>

            <div class="bg-slate-50 p-5 rounded-[24px] border border-slate-100 shadow-inner">
                <h3 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest text-center">Nutrition Report</h3>
                <div id="nutrition-bars" class="space-y-5"></div>
            </div>
        </section>

        <section id="rating-section" class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm text-center">
            <p id="rating-title" class="text-slate-800 text-xs font-black mb-4 uppercase tracking-widest">오늘 식사는 어떠셨나요?</p>
            <div id="star-container" class="flex justify-center gap-3 text-4xl">
                <button onclick="submitRating(1)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(2)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(3)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(4)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                <button onclick="submitRating(5)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
            </div>
            <p id="feedback-msg" class="text-indigo-600 text-[11px] font-bold mt-4 h-4 opacity-0 transition-opacity">✅ 평가가 성공적으로 반영되었습니다!</p>
        </section>

        <section id="admin-view" class="hidden p-5 bg-slate-900 rounded-[24px] text-xs font-mono text-slate-300 shadow-2xl">
            <h4 class="text-emerald-400 font-bold mb-2 tracking-tighter">🛠️ SYSTEM ADMIN DASHBOARD</h4>
            <div class="space-y-1">
                <p>> 누적 평점: <span id="admin-avg" class="text-white font-bold">0.0</span></p>
                <p>> 총 투표수: <span id="admin-count" class="text-white font-bold">0</span>회</p>
            </div>
        </section>
    </main>

    <script>
        const now = new Date();
        const week = ['일', '월', '화', '수', '목', '금', '토'];
        
        // 1. 날짜 표시 및 주말 로직
        let displayDayIndex = now.getDay();
        let isWeekendText = "";

        if (displayDayIndex === 0 || displayDayIndex === 6) { 
            displayDayIndex = 5; // 주말엔 금요일 식단 고정
            isWeekendText = "(금요일 식단)";
        }

        const todayName = week[displayDayIndex];
        document.getElementById('current-date').innerText = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
        document.getElementById('display-day-tag').innerText = todayName + "요일 메뉴 " + isWeekendText;

        // 2. 가변 기온 로직 (시간대에 따라 변함)
        const hour = now.getHours();
        let temp = 22; 
        if (hour < 8) temp = 14;
        else if (hour < 14) temp = 26;
        else if (hour < 20) temp = 21;
        else temp = 17;
        document.getElementById('realtime-temp').innerText = temp + "°";

        function getMealType() {
            if (hour < 9) return { key: 'breakfast', label: 'Breakfast 🍳' };
            if (hour < 14) return { key: 'lunch', label: 'Lunch 🍱' };
            return { key: 'dinner', label: 'Dinner 🌙' };
        }
        const currentMeal = getMealType();
        document.getElementById('meal-type-tag').innerText = currentMeal.label;

        // 3. 식단 데이터 로드 및 렌더링
        async function loadMenu() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const todayData = data[todayName]; 

                if (todayData && todayData[currentMeal.key]) {
                    const menuHtml = todayData[currentMeal.key].split(',').map(m => 
                        `<li class="flex items-center gap-3 p-3.5 bg-white rounded-2xl text-slate-700 font-bold border border-slate-100 shadow-sm transition-all hover:scale-[1.02] active:scale-95">
                            <span class="w-2.5 h-2.5 bg-indigo-400 rounded-full shadow-inner"></span>${m.trim()}
                        </li>`
                    ).join('');
                    document.getElementById('menu-list').innerHTML = menuHtml;

                    const nut = todayData.nutrition;
                    const nutHtml = `
                        ${renderBar('탄수화물', nut.carbs, 'bg-blue-500', '70g', '23%')}
                        ${renderBar('단백질', nut.protein, 'bg-emerald-500', '25g', '42%')}
                        ${renderBar('지방', nut.fat, 'bg-amber-400', '15g', '27%')}
                    `;
                    document.getElementById('nutrition-bars').innerHTML = nutHtml;
                }
            } catch (e) {
                document.getElementById('menu-list').innerHTML = "<li class='p-4 text-gray-400 text-center'>식단 정보를 가져올 수 없습니다.</li>";
            }
        }

        // 가독성을 높인 바 렌더링 함수
        function renderBar(label, val, color, unit, percent) {
            return `<div>
                <div class="flex justify-between items-end mb-2">
                    <span class="text-sm font-black text-slate-800">${label} <span class="text-slate-400 font-medium text-xs ml-1">${unit}</span></span>
                    <span class="text-[11px] font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md text-right">일일 목표의 ${percent} 채움</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-2.5 shadow-inner">
                    <div class="${color} h-2.5 rounded-full shadow-sm transition-all duration-1000" style="width: ${val}%"></div>
                </div>
            </div>`;
        }

        // 4. 평가 시스템 (1회 제한 고도화)
        const ratingKey = `rated_${now.toISOString().split('T')[0]}_${currentMeal.key}`;

        function submitRating(score) {
            if (localStorage.getItem(ratingKey)) return;
            localStorage.setItem(ratingKey, score);
            
            let stats = JSON.parse(localStorage.getItem('admin_stats') || '{"total":0, "count":0}');
            stats.total += score;
            stats.count += 1;
            localStorage.setItem('admin_stats', JSON.stringify(stats));

            lockRatingUI(score);
            document.getElementById('feedback-msg').style.opacity = '1';
        }

        function lockRatingUI(score) {
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((s, i) => { 
                if (i < score) s.classList.add('star-gold'); 
                s.classList.add('cursor-default'); 
                s.classList.remove('grayscale', 'opacity-30');
            });
            document.getElementById('star-container').classList.add('disabled-stars');
            document.getElementById('rating-title').innerText = "이미 평가를 완료한 식단입니다";
            document.getElementById('rating-title').classList.replace('text-gray-400', 'text-indigo-500');
            updateAdmin();
        }

        function updateAdmin() {
            const stats = JSON.parse(localStorage.getItem('admin_stats') || '{"total":0, "count":0}');
            if (stats.count > 0) {
                document.getElementById('admin-avg').innerText = (stats.total / stats.count).toFixed(1);
                document.getElementById('admin-count').innerText = stats.count;
            }
            if (new URLSearchParams(window.location.search).get('admin') === 'true') {
                document.getElementById('admin-view').classList.remove('hidden');
            }
        }

        loadMenu();
        if (localStorage.getItem(ratingKey)) lockRatingUI(localStorage.getItem(ratingKey));
        updateAdmin();
    </script>
</body>
</html>
