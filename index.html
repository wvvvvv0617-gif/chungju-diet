<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="스마트 식단">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3443/3443338.png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/3443/3443338.png">
    <link rel="manifest" href="manifest.json">

    <title>충주캠퍼스 스마트 식단</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
            overscroll-behavior-y: contain;
        }
        .star-gold { color: #fbbf24; filter: drop-shadow(0 0 5px rgba(251, 191, 36, 0.4)); transform: scale(1.1); }
        .disabled-stars { pointer-events: none; opacity: 0.8; }
        .rest-bg { background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%) !important; }
        @keyframes shimmer { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .skeleton { animation: shimmer 1.5s infinite ease-in-out; background-color: #e2e8f0; border-radius: 1rem; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen bg-white shadow-2xl pb-10">

    <header id="main-header" class="bg-gradient-to-br from-indigo-600 to-blue-500 text-white rounded-b-[50px] shadow-xl relative z-10 transition-all duration-700">
        <div style="height: env(safe-area-inset-top); min-height: 20px;"></div>
        <div class="p-8 pt-4">
            <div class="flex justify-between items-start">
                <div>
                    <p id="current-date" class="text-indigo-100 text-sm font-bold mb-1"></p>
                    <h1 id="greeting" class="text-2xl font-bold tracking-tight leading-tight">맛있는 식사 하세요! 🍱</h1>
                </div>
                <div class="bg-white/20 backdrop-blur-md p-2 rounded-2xl text-center min-w-[75px] border border-white/10 flex flex-col gap-1.5">
                    <div class="flex flex-col border-b border-white/10 pb-1">
                        <span class="text-[9px] opacity-80 font-bold tracking-tighter">기온</span>
                        <span id="realtime-temp" class="text-lg font-black italic leading-none">--°</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[9px] opacity-80 font-bold tracking-tighter">강수</span>
                        <span id="precipitation" class="text-sm font-black text-blue-200 leading-none">--%</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="p-5 relative z-20 mt-4 space-y-6">
        <section id="main-card" class="bg-white rounded-[32px] shadow-2xl shadow-blue-100 p-6 border border-gray-50 overflow-hidden min-h-[420px] flex flex-col transition-all duration-500">
            <div id="card-header" class="flex justify-between items-center mb-6">
                <span id="meal-type-tag" class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">LUNCH</span>
                <span id="display-day-tag" class="text-[10px] text-blue-500 font-bold bg-blue-50 px-2 py-1 rounded-md"></span>
            </div>
            
            <div id="meal-content">
                <div class="space-y-4 mb-8">
                    <h2 class="text-2xl font-black text-gray-800 flex items-center gap-2">오늘의 메뉴</h2>
                    <ul id="menu-list" class="grid grid-cols-1 gap-2">
                        <li class="h-14 skeleton"></li>
                        <li class="h-14 skeleton"></li>
                        <li class="h-14 skeleton"></li>
                    </ul>
                </div>
                <div class="bg-slate-50 p-5 rounded-[24px] border border-slate-100 shadow-inner">
                    <h3 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest text-center">Nutrition Report</h3>
                    <div id="nutrition-bars" class="space-y-5"></div>
                    <p class="text-[9px] text-slate-400 mt-6 text-center leading-relaxed font-medium">표시된 영양 정보는 추정치이므로 참고용으로만 활용해 주세요.</p>
                </div>
            </div>

            <div id="weekend-message" class="hidden flex-1 flex flex-col items-center justify-center py-12 text-center space-y-6">
                <div class="text-7xl animate-bounce">😴</div>
                <div>
                    <h2 id="rest-title" class="text-2xl font-black text-slate-800 mb-2">식당도 쿨쿨 자는 중!</h2>
                    <p id="rest-subtitle" class="text-base text-slate-500 leading-relaxed font-medium"></p>
                </div>
                <div class="bg-white/70 backdrop-blur-sm px-8 py-3 rounded-2xl border border-orange-100 shadow-sm">
                    <p id="return-msg" class="text-sm font-black text-orange-600"></p>
                </div>
            </div>
        </section>

        <section id="rating-section" class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm">
            <div class="text-center">
                <p id="rating-title" class="text-slate-800 text-[10px] font-black mb-1 uppercase tracking-widest">
                    방금 드신 <span id="rating-meal-name" class="text-indigo-600">식사</span>는 어떠셨나요?
                </p>
                <p id="rating-menu-preview" class="text-[9px] text-slate-400 font-medium mb-4 px-4 truncate"></p>
                
                <div class="flex flex-col gap-4">
                    <div id="star-container" class="flex justify-center gap-3 text-4xl">
                        <button onclick="selectRating(1)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                        <button onclick="selectRating(2)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                        <button onclick="selectRating(3)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                        <button onclick="selectRating(4)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                        <button onclick="selectRating(5)" class="star-btn grayscale opacity-30 hover:opacity-100 transition-all">⭐</button>
                    </div>

                    <div id="feedback-input-container" class="flex flex-col gap-2">
                        <div class="flex gap-2">
                            <input type="text" id="feedback-text" placeholder="식당 이모님께 전하고 싶은 말씀..." 
                                class="flex-1 bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-xs outline-none focus:border-indigo-300 focus:bg-white transition-all">
                            <button id="send-btn" onclick="submitFullFeedback()" class="bg-indigo-600 text-white px-4 py-3 rounded-xl text-xs font-bold active:scale-95 transition-all disabled:bg-slate-300">보내기</button>
                        </div>
                        <p class="text-[9px] text-slate-400 text-left pl-1">※ 모든 평가는 <span class="font-bold text-indigo-500">익명으로</span> 식당측에 전달됩니다.</p>
                    </div>
                </div>
                <p id="feedback-msg" class="text-indigo-600 text-[11px] font-bold mt-4 h-4 opacity-0 transition-opacity">✅ 소중한 의견 감사합니다!</p>
            </div>
        </section>

        <section id="dev-contact-section" class="mt-12 mb-10 px-2 text-center">
            <div class="p-8 bg-indigo-50/30 rounded-[40px] border border-dashed border-indigo-100">
                <div class="inline-block p-3 bg-white rounded-2xl shadow-sm mb-4">🚀</div>
                <h4 class="text-sm font-black text-indigo-900 mb-2 leading-relaxed">
                    "이런 기능이 있다면 더 완벽할 텐데!"<br>싶은 순간이 있나요?
                </h4>
                <p class="text-[11px] text-indigo-600/70 font-medium mb-6">여러분의 제안이 앱의 미래가 됩니다.</p>
                
                <div id="email-area" class="flex flex-col items-center gap-3">
                    <button id="show-email-btn" onclick="toggleEmail()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl text-xs font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-all">
                        개발자 이메일 주소 보기
                    </button>
                    <a id="dev-email" href="mailto:wvvvvv0617@naver.com" class="hidden text-xs font-black text-indigo-600 underline decoration-indigo-200 underline-offset-4 animate-fadeIn">
                        wvvvvv0617@naver.com
                    </a>
                </div>
            </div>
        </section>

        <section id="admin-view" class="hidden p-6 bg-slate-900 rounded-[32px] text-xs font-mono text-slate-300 shadow-2xl border border-slate-700 space-y-6"></section>
    </main>

    <script>
        const ADMIN_PASSWORD = "0617"; 
        const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLScG35dKFaOFHN5Cls4pcWGX9Q_5J1qa2pOxjBhFpoFddIJucw/formResponse";
        const ENTRY_IDS = {
            date: "entry.1731866414", meal: "entry.475926623", menu: "entry.525600404", score: "entry.615065306", feedback: "entry.119301674"
        };

        let now = new Date();
        const week = ['일', '월', '화', '수', '목', '금', '토'];
        const mealNameKR = { 'breakfast': '아침', 'lunch': '점심', 'dinner': '저녁' };
        let currentMenuData = null;
        let selectedScore = 0; 

        function toggleEmail() {
            const btn = document.getElementById('show-email-btn');
            const emailLink = document.getElementById('dev-email');
            btn.classList.add('hidden');
            emailLink.classList.remove('hidden');
        }

        function getHolidayName(date) {
            const m = date.getMonth() + 1;
            const d = date.getDate();
            const solarHolidays = { '1-1': '신정', '3-1': '삼일절', '5-5': '어린이날', '6-6': '현충일', '8-15': '광복절', '10-3': '개천절', '10-9': '한글날', '12-25': '성탄절' };
            return solarHolidays[`${m}-${d}`] || null;
        }

        function getMealStatus() {
            const day = now.getDay();
            const hm = now.getHours() * 100 + now.getMinutes();
            const tomorrow = new Date(now);
            tomorrow.setDate(now.getDate() + 1);
            const isTodayHoliday = getHolidayName(now) !== null;
            const isTomorrowHoliday = getHolidayName(tomorrow) !== null;
            
            const isWeekend = (day === 5 && hm >= 1830) || day === 6 || day === 0;
            const isHolidayPeriod = (isTomorrowHoliday && hm >= 1830) || isTodayHoliday;

            let returnText = "내일 다시 만나요!";
            let greetingText = "맛있는 식사 하세요! 🍱";
            
            if (isWeekend) {
                returnText = "다음 주 월요일에 봐요!";
                greetingText = "즐겁고 편안한 주말 되세요! ✨";
            } else if (isHolidayPeriod) {
                returnText = "휴일이 끝나면 다시 만나요!";
                greetingText = "꿀같은 휴일 보내세요! 🎈";
            }
            
            let mealKey, mealLabel, targetDayOffset = 0, rateKey = null;

            if (hm < 830) { mealKey = 'breakfast'; mealLabel = 'BREAKFAST 🍳'; }
            else if (hm < 1330) { mealKey = 'lunch'; mealLabel = 'LUNCH 🍱'; }
            else if (hm < 1830) { mealKey = 'dinner'; mealLabel = 'DINNER 🌙'; }
            else { mealKey = 'breakfast'; mealLabel = 'NEXT BREAKFAST ☀️'; targetDayOffset = 1; }

            // [평가 활성화 시간 수정: 점심 13:30부터]
            if (hm >= 830 && hm <= 1300) rateKey = 'breakfast';
            else if (hm >= 1330 && hm <= 1830) rateKey = 'lunch'; // 기존 12:50에서 13:30으로 변경
            else if (hm >= 1840 && hm <= 2350) rateKey = 'dinner';

            return { mealKey, mealLabel, rateKey, isRest: isWeekend || isHolidayPeriod, isHolidayMsg: isHolidayPeriod && !isWeekend, returnText, greetingText, targetDayOffset };
        }

        function updateHeaderUI(status) {
            const dateStr = now.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
            const dayName = week[now.getDay()];
            document.getElementById('current-date').innerText = `${dateStr} (${dayName})`;
            document.getElementById('meal-type-tag').innerText = status.mealLabel;
            document.getElementById('greeting').innerText = status.greetingText;
        }

        async function loadData() {
            const status = getMealStatus();
            updateHeaderUI(status);

            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                currentMenuData = data;
                
                if (data.weather) {
                    document.getElementById('realtime-temp').innerText = data.weather.temp + "°";
                    document.getElementById('precipitation').innerText = data.weather.rain + "%";
                }

                const targetDayName = week[now.getDay()];
                const mealData = data.meals ? data.meals[targetDayName] : null;

                // [평가 섹션 표시 및 중복 체크]
                if (status.rateKey && !status.isRest) {
                    const rateMenu = mealData ? mealData[status.rateKey] : "메뉴 정보 없음";
                    document.getElementById('rating-section').classList.remove('hidden');
                    document.getElementById('rating-meal-name').innerText = mealNameKR[status.rateKey];
                    document.getElementById('rating-menu-preview').innerText = rateMenu;
                    
                    const dateStr = now.toISOString().split('T')[0];
                    const savedScore = localStorage.getItem(`rated_${dateStr}_${status.rateKey}`);
                    
                    if (savedScore) {
                        selectedScore = parseInt(savedScore);
                        lockRatingUI(selectedScore);
                        lockTextFeedbackUI();
                    } else {
                        resetRatingUI();
                    }
                } else {
                    document.getElementById('rating-section').classList.add('hidden');
                }

                if (status.isRest) {
                    document.getElementById('meal-content').classList.add('hidden');
                    document.getElementById('weekend-message').classList.remove('hidden');
                    document.getElementById('main-card').classList.add('rest-bg');
                    document.getElementById('display-day-tag').innerText = "REST DAY";
                    document.getElementById('rest-subtitle').innerText = status.isHolidayMsg ? "공휴일에는 식당 이모님들도 쉬어가셔요." : "주말에는 식당 이모님들도 쉬어가셔요.";
                    document.getElementById('return-msg').innerText = status.returnText;
                } else {
                    document.getElementById('meal-content').classList.remove('hidden');
                    document.getElementById('weekend-message').classList.add('hidden');
                    document.getElementById('main-card').classList.remove('rest-bg');
                    document.getElementById('display-day-tag').innerText = targetDayName + "요일 식단";
                    
                    const currentMeal = mealData ? mealData[status.mealKey] : "식단 없음";
                    if (currentMeal && currentMeal !== "식단 없음") {
                        const items = currentMeal.split(/[, ]+/).filter(i => i.trim());
                        document.getElementById('menu-list').innerHTML = items.map(m => `<li class="flex items-center gap-3 p-3.5 bg-white rounded-2xl text-slate-700 font-bold border border-slate-100 shadow-sm"><span class="w-2.5 h-2.5 bg-indigo-400 rounded-full"></span>${m}</li>`).join('');
                        
                        let nut = (mealData && mealData.nutrition) ? mealData.nutrition[status.mealKey] : null;
                        if (nut) {
                            document.getElementById('nutrition-bars').innerHTML = `
                                ${renderBar('탄수화물', nut.carbs, 'bg-blue-500', nut.carbs + 'g')}
                                ${renderBar('단백질', nut.protein, 'bg-emerald-500', nut.protein + 'g')}
                                ${renderBar('지방', nut.fat, 'bg-amber-400', nut.fat + 'g')}
                                ${renderBar('당류', nut.sugar, 'bg-rose-400', nut.sugar + 'g')}
                            `;
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }

        function renderBar(label, val, color, weight) {
            return `<div><div class="flex justify-between items-end mb-1"><div class="flex items-baseline gap-1.5"><span class="text-[11px] font-black text-slate-800">${label}</span><span class="text-[9px] font-bold text-slate-400">${val}%</span></div><span class="text-[10px] font-black text-indigo-600">${weight}</span></div><div class="w-full bg-slate-200 rounded-full h-2 overflow-hidden"><div class="${color} h-full transition-all duration-1000" style="width: ${val}%"></div></div></div>`;
        }

        function selectRating(score) {
            // 이미 제출한 경우 클릭 방지
            const dateStr = now.toISOString().split('T')[0];
            const status = getMealStatus();
            if (localStorage.getItem(`rated_${dateStr}_${status.rateKey}`)) return;

            selectedScore = score;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((s, i) => { 
                if (i < score) s.classList.add('star-gold', 'opacity-100'), s.classList.remove('grayscale', 'opacity-30');
                else s.classList.add('grayscale', 'opacity-30'), s.classList.remove('star-gold', 'opacity-100');
            });
        }

        function resetRatingUI() {
            selectedScore = 0;
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach(s => { s.classList.add('grayscale', 'opacity-30'); s.classList.remove('star-gold', 'opacity-100'); });
            document.getElementById('star-container').classList.remove('disabled-stars');
            document.getElementById('rating-title').innerHTML = `방금 드신 <span id="rating-meal-name" class="text-indigo-600">${mealNameKR[getMealStatus().rateKey] || '식사'}</span>는 어떠셨나요?`;
            const input = document.getElementById('feedback-text');
            const btn = document.getElementById('send-btn');
            input.disabled = false; input.placeholder = "식당 이모님께 전하고 싶은 말씀..."; input.value = "";
            btn.disabled = false; btn.innerText = "보내기";
        }

        async function submitFullFeedback() {
            const text = document.getElementById('feedback-text').value.trim();
            const status = getMealStatus();
            const dateStr = now.toISOString().split('T')[0];
            const ratingKey = `rated_${dateStr}_${status.rateKey}`;
            const menuText = document.getElementById('rating-menu-preview').innerText;

            if (selectedScore === 0) { alert("별점을 먼저 선택해 주세요!"); return; }
            if (localStorage.getItem(ratingKey)) { alert("이미 오늘의 평가를 완료하셨습니다!"); return; }

            const formData = new FormData();
            formData.append(ENTRY_IDS.date, dateStr);
            formData.append(ENTRY_IDS.meal, mealNameKR[status.rateKey]);
            formData.append(ENTRY_IDS.menu, menuText);
            formData.append(ENTRY_IDS.score, selectedScore);
            formData.append(ENTRY_IDS.feedback, text || "(의견 없음)");

            fetch(GOOGLE_FORM_URL, { method: 'POST', mode: 'no-cors', body: formData });
            
            // 로컬 스토리지에 저장하여 중복 방지
            localStorage.setItem(ratingKey, selectedScore);
            
            let stats = JSON.parse(localStorage.getItem('admin_stats_v3') || '{}');
            const key = `${dateStr}_${status.rateKey}`;
            if (!stats[key]) stats[key] = { total: 0, count: 0, feedbacks: [] };
            stats[key].total += selectedScore;
            stats[key].count += 1;
            if(text) stats[key].feedbacks.push({ time: new Date().toLocaleTimeString(), msg: text });
            localStorage.setItem('admin_stats_v3', JSON.stringify(stats));

            lockRatingUI(selectedScore);
            lockTextFeedbackUI();
            document.getElementById('feedback-msg').style.opacity = '1';
            setTimeout(() => { document.getElementById('feedback-msg').style.opacity = '0'; }, 3000);
            updateAdmin();
        }

        function lockRatingUI(score) {
            const starContainer = document.getElementById('star-container');
            if(starContainer) starContainer.classList.add('disabled-stars');
            const ratingTitle = document.getElementById('rating-title');
            if(ratingTitle) ratingTitle.innerText = "평가 완료! 감사합니다.";
            
            // 저장된 별점 UI 반영
            const stars = document.querySelectorAll('.star-btn');
            stars.forEach((s, i) => { 
                if (i < score) s.classList.add('star-gold', 'opacity-100'), s.classList.remove('grayscale', 'opacity-30');
                else s.classList.add('grayscale', 'opacity-30'), s.classList.remove('star-gold', 'opacity-100');
            });
        }

        function lockTextFeedbackUI() {
            const input = document.getElementById('feedback-text');
            const btn = document.getElementById('send-btn');
            if(input) { input.disabled = true; input.placeholder = "참여해주셔서 감사합니다."; input.value = ""; }
            if(btn) { btn.disabled = true; btn.innerText = "완료"; }
        }

        function updateAdmin() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') === 'true') {
                if (sessionStorage.getItem('admin_auth') !== 'true') {
                    const pw = prompt("관리자 비밀번호를 입력하세요:");
                    if (pw === ADMIN_PASSWORD) sessionStorage.setItem('admin_auth', 'true');
                    else { window.location.href = window.location.pathname; return; }
                }
                const stats = JSON.parse(localStorage.getItem('admin_stats_v3') || '{}');
                const adminView = document.getElementById('admin-view');
                let reportHtml = `<h4 class="text-emerald-400 font-bold mb-4 tracking-tighter text-sm">🛠️ ADMIN DASHBOARD</h4>`;
                Object.entries(stats).reverse().forEach(([k, v]) => {
                    const [date, meal] = k.split('_');
                    const d = new Date(date);
                    const dayName = week[d.getDay()];
                    let actualMenu = (currentMenuData && currentMenuData.meals[dayName]) ? (currentMenuData.meals[dayName][meal] || "식단 정보 없음") : "데이터 로딩 중...";
                    reportHtml += `
                        <div class="bg-slate-800/50 p-5 rounded-2xl mb-4 border border-slate-700">
                            <div class="mb-3">
                                <div class="flex justify-between items-start">
                                    <span class="text-[10px] text-indigo-400 font-bold">${date} (${dayName})</span>
                                    <span class="text-yellow-400 font-bold">⭐ ${(v.total/v.count || 0).toFixed(1)} <span class="text-[9px] text-slate-500">(${v.count}명)</span></span>
                                </div>
                                <h5 class="text-white font-bold text-sm mt-1">${mealNameKR[meal]} 식단</h5>
                                <p class="text-[10px] text-slate-400 leading-tight mt-1">🍴 ${actualMenu}</p>
                            </div>
                            <div class="space-y-1.5 mt-3 border-t border-slate-700 pt-3">
                                ${(v.feedbacks || []).map(f => `<div class="bg-slate-900/50 p-2 rounded-lg border border-slate-800/50"><p class="text-slate-300 text-[11px] leading-relaxed"><span class="text-[9px] text-indigo-500/70 font-mono mr-1">${f.time}</span> ${f.msg}</p></div>`).join('') || '<p class="text-slate-600 italic text-[10px]">건의사항 없음</p>'}
                            </div>
                        </div>`;
                });
                adminView.innerHTML = reportHtml + `<button onclick="resetStats()" class="w-full py-3 bg-rose-500/20 text-rose-400 border border-rose-500/50 rounded-xl font-bold mt-4 active:bg-rose-500/40">데이터 초기화</button>`;
                adminView.classList.remove('hidden');
            }
        }

        function resetStats() {
            if (confirm("모든 기록을 삭제하시겠습니까?")) {
                localStorage.removeItem('admin_stats_v3');
                Object.keys(localStorage).forEach(key => { if (key.startsWith('rated_')) localStorage.removeItem(key); });
                location.reload();
            }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                now = new Date();
                loadData();
                updateAdmin();
            }
        });

        setInterval(() => {
            const mealTag = document.getElementById('meal-type-tag');
            if(mealTag) {
                const currentLabel = mealTag.innerText;
                now = new Date();
                const status = getMealStatus();
                if (currentLabel !== status.mealLabel) {
                    loadData();
                    updateAdmin();
                }
            }
        }, 60000);

        loadData();
        updateAdmin();
    </script>
</body>
</html>
