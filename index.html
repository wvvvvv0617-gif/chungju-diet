<header class="p-6 bg-gradient-to-r from-blue-500 to-indigo-600 text-white rounded-b-3xl shadow-lg">
    <div class="flex justify-between items-center">
        <div>
            <h1 id="greeting" class="text-2xl font-bold">안녕하세요, 사용자님! 👋</h1>
            <p id="weather" class="text-sm opacity-90">☀️ 충주는 지금 맑음, 기분 좋은 한 끼 되세요!</p>
        </div>
        <div class="text-4xl">🌡️ 22°</div>
    </div>
</header>

<main class="p-4 space-y-6">
    <section class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <div class="p-5">
            <div class="flex items-center space-y-1 mb-4">
                <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold uppercase">Today's Lunch</span>
            </div>
            
            <div class="space-y-3 mb-6">
                <h2 class="text-xl font-extrabold text-gray-800 flex items-center gap-2">
                    🍱 오늘 점심 메뉴
                </h2>
                <ul id="menu-list" class="text-gray-600 space-y-2 pl-1">
                    <li class="flex items-center gap-2">🍚 쌀밥</li>
                    <li class="flex items-center gap-2">🥘 청국장찌개</li>
                    <li class="flex items-center gap-2">🥬 섞박지</li>
                    <li class="flex items-center gap-2">🥤 떠먹는 요거트</li>
                </ul>
            </div>

            <div class="bg-gray-50 p-4 rounded-2xl space-y-3">
                <h3 class="text-sm font-bold text-gray-500">영양 성분 리포트</h3>
                <div class="space-y-2">
                    <div>
                        <div class="flex justify-between text-xs mb-1"><span>탄수화물</span><span class="font-bold">70g</span></div>
                        <div class="w-full bg-gray-200 rounded-full h-1.5"><div class="bg-blue-400 h-1.5 rounded-full" style="width: 70%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs mb-1"><span>단백질</span><span class="font-bold">25g</span></div>
                        <div class="w-full bg-gray-200 rounded-full h-1.5"><div class="bg-green-400 h-1.5 rounded-full" style="width: 50%"></div></div>
                    </div>
                    <div>
                        <div class="flex justify-between text-xs mb-1"><span>지방</span><span class="font-bold">15g</span></div>
                        <div class="w-full bg-gray-200 rounded-full h-1.5"><div class="bg-yellow-400 h-1.5 rounded-full" style="width: 30%"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="p-4 text-center">
        <p class="text-gray-500 text-sm mb-2">오늘 식사는 어떠셨나요?</p>
        <div class="flex justify-center gap-2 text-3xl">
            <button onclick="rateMenu(1)">⭐</button>
            <button onclick="rateMenu(2)">⭐</button>
            <button onclick="rateMenu(3)">⭐</button>
            <button onclick="rateMenu(4)">⭐</button>
            <button onclick="rateMenu(5)">⭐</button>
        </div>
    </section>

    <section id="admin-view" class="hidden border-t-2 border-dashed pt-4 mt-8">
        <h4 class="text-red-500 font-bold text-sm mb-2">🛠️ 개발자 전용 평가 데이터</h4>
        <div class="bg-black text-green-400 p-3 rounded-lg text-xs font-mono">
            > 만족도 평균: 4.5/5.0 <br>
            > 최근 리뷰: "청국장이 아주 진해요!"
        </div>
    </section>
</main>
