    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;

            padding-bottom: env(safe-area-inset-bottom);

            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;

        }

        .dark body {
            background-color: #020617 !important;
            color: #ffffff !important;
        }

        .dark #main-header {
            background: linear-gradient(135deg, #172554 0%, #0f172a 55%, #020617 100%) !important;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .heart-active {
            color: #f43f5e;
            filter: drop-shadow(0 0 8px rgba(244, 63, 94, 0.4));

        }

        .disabled-heart {
            pointer-events: none;
        }

        .rest-bg {
            background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 100%) !important;
        }

        .dark .rest-bg {
            background: linear-gradient(135deg, #0b1220 0%, #111827 100%) !important;

        }

        @keyframes shimmer {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }

            animation: shimmer 1.5s infinite ease-in-out;

            border-radius: 1rem;

            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }
            to {
                opacity: 1;

            }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }

        #main-card {

<script>

window.addEventListener('contextmenu', (e) => e.preventDefault());

const NO_MEAL_KEYWORDS = [
    "식단 없음",
    "식단없음",
    "일손돕기",
    "가정일손돕기",
    "수업없음",
    "수업 없음",
    "어린이날",
    "휴업",
    "공휴일",
    "재량휴업",
    "신정",
    "삼일절",
    "현충일",
    "광복절",
    "개천절",
    "한글날",
    "성탄절",
    "추석",
    "설날",
    "대체공휴일",
    "석가탄신일",
    "선거",
    "창립기념일",
    "방학",
    "하계방학",
    "동계방학",
    "임시공휴일",
    "휴교",
    "휴강",
    "행사",
    "졸업식",
    "입학식"
];

let now = new Date();
let currentMenuData = null;

const week = ['일', '월', '화', '수', '목', '금', '토'];

const mealNameKR = {
    breakfast: '아침',
    lunch: '점심',
    dinner: '저녁'
};

const mealLabels = {
    breakfast: 'BREAKFAST 🍳',
    lunch: 'LUNCH 🍱',
    dinner: 'DINNER 🌙'
};

function initTheme() {

    const savedTheme = localStorage.getItem('theme');

    if (savedTheme) {

        document.documentElement.classList.toggle('dark', savedTheme === 'dark');

        document.getElementById('dark-icon').innerText =
            savedTheme === 'dark' ? '🌙' : '☀️';

    } else {

        document.documentElement.classList.remove('dark');

        document.getElementById('dark-icon').innerText = '☀️';

        localStorage.setItem('theme', 'light');
    }
}

initTheme();

function toggleDarkMode() {

    const isDark = document.documentElement.classList.toggle('dark');

    localStorage.setItem('theme', isDark ? 'dark' : 'light');

    document.getElementById('dark-icon').innerText =
        isDark ? '🌙' : '☀️';
}

function getHolidayName(date) {

    const m = date.getMonth() + 1;
    const d = date.getDate();

    const solarHolidays = {
        '1-1': '신정',
        '3-1': '삼일절',
        '5-5': '어린이날',
        '6-6': '현충일',
        '8-15': '광복절',
        '10-3': '개천절',
        '10-9': '한글날',
        '12-25': '성탄절'
    };

    return solarHolidays[`${m}-${d}`] || null;
}

function getFixedRandom(value, mealKey, menuText, range = 0.1) {

    const dateStr = new Date().toISOString().split('T')[0];

    const seedStr =
        dateStr + mealKey + menuText + value;

    let hash = 0;

    for (let i = 0; i < seedStr.length; i++) {

        hash = ((hash << 5) - hash) + seedStr.charCodeAt(i);

        hash |= 0;
    }

    const fixedRandom =
        (Math.abs(hash) % 100) / 100 * 2 - 1;

    const variation =
        value * range * fixedRandom;

    return Math.round(value + variation);
}

function estimateNutrition(menuText, mealKey) {

    if (!menuText || menuText.trim().length < 2) return null;

    if (NO_MEAL_KEYWORDS.some(key => menuText.includes(key))) {
        return null;
    }

    const foodKeywords = [
        "밥", "면", "죽", "빵", "떡", "볶음", "구이", "조림",
        "찜", "튀김", "전", "카츠", "가스", "국", "찌개", "탕",
        "고기", "닭", "돈육", "생선", "오리", "소고기", "돼지",
        "새우", "김치", "나물", "샐러드", "계란", "두부",
        "치즈", "요거트", "음료", "주스", "푸딩", "과일",
        "스프", "파스타", "카레"
    ];

    const hasFoodKeyword =
        foodKeywords.some(kw => menuText.includes(kw));

    if (!hasFoodKeyword) return null;

    let cal = 0;
    let carb = 0;
    let prot = 0;
    let fat = 0;
    let sugar = 0;
    let matched = false;

    if (
        menuText.includes("밥") ||
        menuText.includes("면") ||
        menuText.includes("죽")
    ) {
        cal += 420;
        carb += 75;
        prot += 7;
        matched = true;
    }

    if (
        menuText.includes("고기") ||
        menuText.includes("닭") ||
        menuText.includes("돈육") ||
        menuText.includes("생선") ||
        menuText.includes("오리")
    ) {
        cal += 280;
        prot += 22;
        fat += 14;
        matched = true;
    }

    if (
        menuText.includes("튀김") ||
        menuText.includes("가스") ||
        menuText.includes("전") ||
        menuText.includes("카츠")
    ) {
        cal += 220;
        fat += 18;
        matched = true;
    }

    if (
        menuText.includes("찌개") ||
        menuText.includes("국") ||
        menuText.includes("탕")
    ) {
        cal += 120;
        carb += 12;
        sugar += 4;
        matched = true;
    }

    if (
        menuText.includes("음료") ||
        menuText.includes("요거트") ||
        menuText.includes("주스") ||
        menuText.includes("푸딩")
    ) {
        cal += 90;
        sugar += 18;
        matched = true;
    }

    if (!matched) return null;

    cal = cal || 650;
    carb = carb || 95;
    prot = prot || 28;
    fat = fat || 16;
    sugar = sugar || 12;

    return {
        calories: getFixedRandom(cal, mealKey, menuText),
        carbs: getFixedRandom(carb, mealKey, menuText),
        protein: getFixedRandom(prot, mealKey, menuText),
        fat: getFixedRandom(fat, mealKey, menuText),
        sugar: getFixedRandom(sugar, mealKey, menuText)
    };
}

function renderBar(label, val, color, weight) {

    return `
    <div>

        <div class="flex justify-between items-end mb-1">

            <span class="text-[12px] font-black text-slate-950 dark:text-white">
                ${label}
            </span>

            <span class="text-[11px] font-black text-indigo-800 dark:text-indigo-300">
                ${weight}
            </span>

        </div>

        <div class="w-full bg-slate-300 dark:bg-slate-900 rounded-full h-2.5 overflow-hidden">

            <div class="${color} h-full transition-all duration-1000"
                 style="width:${val}%">
            </div>

        </div>

    </div>
    `;
}

function renderBarTotal(label, val, color, weight, recommended) {

    return `
    <div>

        <div class="flex justify-between items-end mb-1">

            <span class="text-[12px] font-black text-slate-950 dark:text-white">
                ${label}
            </span>

            <div class="flex flex-col items-end gap-0.5">

                <span class="text-[11px] font-black text-violet-800 dark:text-violet-300">
                    ${weight}
                </span>

                <span class="text-[9px] text-slate-800 dark:text-slate-300 font-bold">
                    ${recommended}
                </span>

            </div>

        </div>

        <div class="w-full bg-slate-300 dark:bg-slate-900 rounded-full h-2.5 overflow-hidden">

            <div class="${color} h-full transition-all duration-1000"
                 style="width:${val}%">
            </div>

        </div>

    </div>
    `;
}

function renderDayMenu(targetDate) {

    if (!currentMenuData) return;

    const dayNameKR = week[targetDate.getDay()];

    const displayDateStr =
        targetDate.toLocaleDateString('ko-KR', {
            month: 'long',
            day: 'numeric'
        });

    const isWeekend =
        targetDate.getDay() === 6 ||
        targetDate.getDay() === 0;

    const isHoliday =
        getHolidayName(targetDate) !== null;

    const isRest = isWeekend || isHoliday;

    document.getElementById('display-date-tag').innerText =
        displayDateStr;

    if (isRest) {

        document.getElementById('meal-content').classList.add('hidden');

        document.getElementById('weekend-message').classList.remove('hidden');

        document.getElementById('main-card').classList.add('rest-bg');

        document.getElementById('display-day-tag').innerText =
            "REST DAY";

        document.getElementById('rest-subtitle').innerText =
            isHoliday
                ? "공휴일에는 식당이 쉬어갑니다."
                : "주말에는 식당이 쉬어갑니다.";

        return;
    }

    document.getElementById('meal-content').classList.remove('hidden');

    document.getElementById('weekend-message').classList.add('hidden');

    document.getElementById('main-card').classList.remove('rest-bg');

    document.getElementById('display-day-tag').innerText =
        dayNameKR + "요일 식단";

    const mealData =
        currentMenuData.meals
            ? currentMenuData.meals[dayNameKR]
            : null;

    const container =
        document.getElementById('meals-container');

    container.innerHTML = '';

    const mealsToRender = [
        'breakfast',
        'lunch',
        'dinner'
    ];

    let totalNutrition = {
        calories: 0,
        carbs: 0,
        protein: 0,
        fat: 0,
        sugar: 0
    };

    let totalNutritionCount = 0;

    mealsToRender.forEach(key => {

        const rawMenu =
            mealData
                ? mealData[key]
                : "식단 없음";

        const isNoMeal =
            !rawMenu ||
            NO_MEAL_KEYWORDS.some(keyword =>
                rawMenu.includes(keyword)
            );

        let html = `<div class="animate-fadeIn">`;

        html += `
        <div class="flex items-center gap-2 mb-3">

            <span class="bg-indigo-200 text-indigo-900 px-3 py-1 rounded-full text-[11px] font-black tracking-widest uppercase dark:bg-indigo-600 dark:text-white border border-indigo-300 dark:border-indigo-400">
                ${mealLabels[key]}
            </span>

            <h2 class="text-2xl font-black text-slate-950 dark:text-white">
                ${mealNameKR[key]}
            </h2>

        </div>
        `;

        if (!isNoMeal) {

            const items =
                rawMenu
                    .split(/,\s*/)
                    .filter(i => i.trim());

            html += `
            <ul class="grid grid-cols-1 gap-2 mb-4">

                ${items.map(m => `
                    <li class="meal-item-card flex items-center gap-3 p-3.5 bg-white dark:bg-slate-700 rounded-2xl text-slate-950 dark:text-white font-black border border-slate-300 dark:border-slate-600 shadow-sm">

                        <span class="w-2.5 h-2.5 bg-indigo-600 dark:bg-yellow-400 rounded-full flex-shrink-0"></span>

                        ${m}

                    </li>
                `).join('')}

            </ul>
            `;

            let nut =
                (mealData && mealData.nutrition)
                    ? mealData.nutrition[key]
                    : null;

            if (!nut || (!nut.calories && !nut.carbs)) {
                nut = estimateNutrition(rawMenu, key);
            }

            if (nut) {

                totalNutrition.calories += nut.calories || 0;
                totalNutrition.carbs += nut.carbs || 0;
                totalNutrition.protein += nut.protein || 0;
                totalNutrition.fat += nut.fat || 0;
                totalNutrition.sugar += nut.sugar || 0;

                totalNutritionCount++;

                const calPercent =
                    Math.min((nut.calories / 1000) * 100, 100);

                const carbPercent =
                    Math.min((nut.carbs / 150) * 100, 100);

                const protPercent =
                    Math.min((nut.protein / 60) * 100, 100);

                const fatPercent =
                    Math.min((nut.fat / 40) * 100, 100);

                const sugarPercent =
                    Math.min((nut.sugar / 30) * 100, 100);

                html += `
                <div class="nutrition-card bg-gradient-to-br from-slate-100 via-blue-50 to-indigo-50 dark:bg-slate-800/60 p-5 rounded-[24px] border border-slate-200 dark:border-slate-700 shadow-inner">

                    <h3 class="text-[11px] font-black text-slate-800 mb-4 uppercase tracking-widest text-center dark:text-yellow-400">
                        Nutrition Report
                    </h3>

                    <div class="space-y-4">

                        ${renderBar(
                            '총 열량(Calories)',
                            calPercent,
                            'bg-indigo-500 dark:bg-indigo-400',
                            nut.calories + ' kcal'
                        )}

                        <div class="h-px bg-slate-300 dark:bg-slate-700 my-1"></div>

                        ${renderBar(
                            '탄수화물(Carbs)',
                            carbPercent,
                            'bg-sky-500 dark:bg-sky-400',
                            nut.carbs + 'g'
                        )}

                        ${renderBar(
                            '단백질(Protein)',
                            protPercent,
                            'bg-emerald-500 dark:bg-emerald-400',
                            nut.protein + 'g'
                        )}

                        ${renderBar(
                            '지방(Fat)',
                            fatPercent,
                            'bg-amber-500 dark:bg-amber-400',
                            nut.fat + 'g'
                        )}

                        ${renderBar(
                            '당류(Sugar)',
                            sugarPercent,
                            'bg-rose-500 dark:bg-rose-400',
                            nut.sugar + 'g'
                        )}

                    </div>

                </div>
                `;
            }

        } else {

            const isSpecialDay =
                NO_MEAL_KEYWORDS.some(keyword =>
                    rawMenu &&
                    rawMenu.includes(keyword) &&
                    keyword !== "식단 없음" &&
                    keyword !== "식단없음"
                );

            const emptyMsg =
                isSpecialDay
                    ? rawMenu
                    : "등록된 식단 정보가 없습니다.";

            html += `
            <div class="meal-item-card p-6 text-center font-black text-slate-900 dark:text-slate-100 bg-white dark:bg-slate-700 rounded-2xl border border-slate-300 dark:border-slate-600 shadow-sm">

                ${emptyMsg}

            </div>
            `;
        }

        html += `</div>`;

        container.innerHTML += html;
    });

    if (totalNutritionCount > 0) {

        const totalCalPercent =
            Math.min((totalNutrition.calories / 2000) * 100, 100);

        const totalCarbPercent =
            Math.min((totalNutrition.carbs / 324) * 100, 100);

        const totalProtPercent =
            Math.min((totalNutrition.protein / 55) * 100, 100);

        const totalFatPercent =
            Math.min((totalNutrition.fat / 54) * 100, 100);

        const totalSugarPercent =
            Math.min((totalNutrition.sugar / 100) * 100, 100);

        container.innerHTML += `
        <div class="animate-fadeIn">

            <div class="flex items-center gap-2 mb-3">

                <span class="bg-violet-200 text-violet-900 px-3 py-1 rounded-full text-[11px] font-black tracking-widest uppercase dark:bg-violet-600 dark:text-white border border-violet-300 dark:border-violet-400">
                    TODAY 📊
                </span>

                <h2 class="text-2xl font-black text-slate-950 dark:text-white">
                    하루 총 섭취량
                </h2>

            </div>

            <div class="daily-total-card bg-gradient-to-br from-slate-100 via-indigo-50 to-blue-50 dark:from-slate-800/80 dark:to-slate-900/80 p-5 rounded-[24px] border border-slate-200 dark:border-slate-700 shadow-inner">

                <h3 class="text-[11px] font-black text-slate-800 mb-1 uppercase tracking-widest text-center dark:text-yellow-400">
                    Daily Nutrition Total
                </h3>

                <p class="text-[10px] text-slate-800 dark:text-slate-200 text-center mb-4 font-bold">
                    오늘 식단 기준 추정치 · 권장 섭취량 대비
                </p>

                <div class="space-y-4">

                    ${renderBarTotal(
                        '총 열량(Calories)',
                        totalCalPercent,
                        'bg-indigo-500 dark:bg-indigo-400',
                        totalNutrition.calories + ' kcal',
                        '권장 2,000kcal'
                    )}

                    <div class="h-px bg-slate-300 dark:bg-slate-700 my-1"></div>

                    ${renderBarTotal(
                        '탄수화물(Carbs)',
                        totalCarbPercent,
                        'bg-sky-500 dark:bg-sky-400',
                        totalNutrition.carbs + 'g',
                        '권장 324g'
                    )}

                    ${renderBarTotal(
                        '단백질(Protein)',
                        totalProtPercent,
                        'bg-emerald-500 dark:bg-emerald-400',
                        totalNutrition.protein + 'g',
                        '권장 55g'
                    )}

                    ${renderBarTotal(
                        '지방(Fat)',
                        totalFatPercent,
                        'bg-amber-500 dark:bg-amber-400',
                        totalNutrition.fat + 'g',
                        '권장 54g'
                    )}

                    ${renderBarTotal(
                        '당류(Sugar)',
                        totalSugarPercent,
                        'bg-rose-500 dark:bg-rose-400',
                        totalNutrition.sugar + 'g',
                        '권장 100g'
                    )}

                </div>

            </div>

        </div>
        `;
    }
}

async function loadData() {

    now = new Date();

    const dateStr =
        now.toLocaleDateString('ko-KR', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

    document.getElementById('current-date').innerText =
        `${dateStr} (${week[now.getDay()]})`;

    try {

        const response =
            await fetch('data.json?v=' + Date.now());

        currentMenuData =
            await response.json();

        if (currentMenuData.weather) {

            document.getElementById('realtime-temp').innerText =
                currentMenuData.weather.temp + "°";

            document.getElementById('precipitation').innerText =
                currentMenuData.weather.rain + "%";
        }

        renderDayMenu(now);

    } catch (e) {

        console.error("Data Load Error:", e);
    }
}

document.addEventListener("visibilitychange", () => {

    if (document.visibilityState === "visible") {
        loadData();
    }
});

if ('serviceWorker' in navigator) {

    window.addEventListener('load', () => {

        navigator.serviceWorker
            .register('./sw.js')
            .then(() => {
                console.log('Service Worker registered.');
            })
            .catch(err => {
                console.log('Service Worker registration failed:', err);
            });

    });
}

loadData();

</script>

</body>
</html>
