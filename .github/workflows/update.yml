name: Auto Menu Update
on:
  schedule:
    # 한국 시간 기준 약 3시간마다 실행 (00:20, 03:20, 06:20, 09:20, 12:20, 15:20, 18:20, 21:20)
    # 정각을 피하면 실행 대기 시간을 줄일 수 있습니다.
    - cron: "27 */3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4
        
    - name: Run scraper
      run: python scraper.py
      env:
        KMA_API_KEY: ${{ secrets.KMA_API_KEY }}
      
    - name: Commit data.json
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add data.json
        # 변경 사항이 없을 경우 에러 없이 통과
        git commit -m "auto update: $(date -u +'%Y-%m-%d %H:%M:%S')" || echo "no changes"
        git push
